<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg-f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161A"/>
      <stop offset="100%" stop-color="#1c1a14"/>
    </linearGradient>
    <radialGradient id="orb-f" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4B21D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F4561D" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-f"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg-f)"/>

  <!-- Bar chart bars -->
  <g opacity="0.12" fill="white">
    <rect x="120" y="520" width="60" height="140"/>
    <rect x="220" y="440" width="60" height="220"/>
    <rect x="320" y="380" width="60" height="280"/>
    <rect x="420" y="300" width="60" height="360"/>
    <rect x="520" y="240" width="60" height="420"/>
    <rect x="620" y="180" width="60" height="480"/>
  </g>
  <!-- Highlighted bars -->
  <rect x="520" y="240" width="60" height="420" fill="#F4B21D" opacity="0.25"/>
  <rect x="620" y="180" width="60" height="480" fill="#F4561D" opacity="0.3"/>

  <!-- Trend line -->
  <polyline points="150,530 250,460 350,400 450,320 550,255 650,195" fill="none" stroke="#F4561D" stroke-width="3" stroke-opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on line -->
  <g fill="#F4561D" fill-opacity="0.85">
    <circle cx="150" cy="530" r="6"/>
    <circle cx="250" cy="460" r="6"/>
    <circle cx="350" cy="400" r="6"/>
    <circle cx="450" cy="320" r="6"/>
    <circle cx="550" cy="255" r="6"/>
    <circle cx="650" cy="195" r="6"/>
  </g>

  <!-- Glow behind chart -->
  <circle cx="700" cy="500" r="300" fill="url(#orb-f)" filter="url(#blur-f)"/>

  <!-- Large % symbol -->
  <text x="720" y="580" font-family="'Archivo Expanded', sans-serif" font-size="340" font-weight="800" fill="white" fill-opacity="0.04" letter-spacing="-0.04em">%</text>

  <!-- Axis -->
  <line x1="100" y1="670" x2="750" y2="670" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="100" y1="150" x2="100" y2="670" stroke="white" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Category label -->
  <rect x="68" y="64" width="110" height="30" rx="15" fill="#F4B21D" fill-opacity="0.9"/>
  <text x="123" y="84" font-family="'Hanken Grotesk', sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em" fill="#14161A" text-anchor="middle">FINANCE</text>

  <text x="68" y="700" font-family="'Archivo Expanded', sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="white" opacity="0.95">Numbers</text>
  <text x="68" y="762" font-family="'Archivo Expanded', sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="#F4B21D" opacity="0.9">Decoded.</text>
</svg>
