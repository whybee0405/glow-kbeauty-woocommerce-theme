<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bg-b" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#F4561D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14161A"/>
    </radialGradient>
    <radialGradient id="orb-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4561D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F4561D" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-b"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <!-- Base -->
  <rect width="1200" height="800" fill="#14161A"/>
  <rect width="1200" height="800" fill="url(#bg-b)"/>

  <!-- Perspective road grid -->
  <g stroke="#F4561D" stroke-opacity="0.12" stroke-width="1" fill="none">
    <!-- Horizontal lines converging to vanishing point (600, 300) -->
    <line x1="0" y1="800" x2="600" y2="300"/>
    <line x1="120" y1="800" x2="600" y2="300"/>
    <line x1="240" y1="800" x2="600" y2="300"/>
    <line x1="360" y1="800" x2="600" y2="300"/>
    <line x1="480" y1="800" x2="600" y2="300"/>
    <line x1="600" y1="800" x2="600" y2="300"/>
    <line x1="720" y1="800" x2="600" y2="300"/>
    <line x1="840" y1="800" x2="600" y2="300"/>
    <line x1="960" y1="800" x2="600" y2="300"/>
    <line x1="1080" y1="800" x2="600" y2="300"/>
    <line x1="1200" y1="800" x2="600" y2="300"/>
    <!-- Cross lines at various depths -->
    <line x1="0" y1="640" x2="1200" y2="640"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="190" y1="400" x2="1010" y2="400"/>
    <line x1="280" y1="360" x2="920" y2="360"/>
    <line x1="360" y1="330" x2="840" y2="330"/>
  </g>

  <!-- Glow orb at vanishing point -->
  <circle cx="600" cy="300" r="220" fill="url(#orb-b)" filter="url(#blur-b)"/>

  <!-- Speed streaks -->
  <g stroke="white" stroke-opacity="0.06" stroke-width="1.5" fill="none">
    <line x1="0" y1="420" x2="420" y2="420"/>
    <line x1="0" y1="450" x2="380" y2="450"/>
    <line x1="0" y1="480" x2="350" y2="480"/>
    <line x1="780" y1="420" x2="1200" y2="420"/>
    <line x1="820" y1="450" x2="1200" y2="450"/>
    <line x1="850" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- Car silhouette (simple polygon) -->
  <g fill="none" stroke="white" stroke-opacity="0.22" stroke-width="2">
    <path d="M340 530 L340 490 Q380 440 440 430 L680 428 Q760 430 800 460 L860 490 L860 530 Z"/>
    <circle cx="420" cy="535" r="28" stroke-opacity="0.3"/>
    <circle cx="780" cy="535" r="28" stroke-opacity="0.3"/>
    <path d="M440 430 L460 380 L680 378 L700 428" stroke-opacity="0.15"/>
  </g>

  <!-- Category label -->
  <rect x="68" y="64" width="160" height="30" rx="15" fill="#F4561D" fill-opacity="0.9"/>
  <text x="148" y="84" font-family="'Hanken Grotesk', sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em" fill="white" text-anchor="middle">BUYING GUIDE</text>

  <!-- Main headline -->
  <text x="68" y="700" font-family="'Archivo Expanded', sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="white" opacity="0.95">First Car</text>
  <text x="68" y="762" font-family="'Archivo Expanded', sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="#F4561D" opacity="0.9">Sorted.</text>
</svg>
