<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bg-m" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0e2a"/>
      <stop offset="100%" stop-color="#0f1118"/>
    </radialGradient>
    <radialGradient id="orb-m1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FF0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7B2FF0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-m2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4561D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F4561D" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-m"><feGaussianBlur stdDeviation="55"/></filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg-m)"/>

  <!-- Background orbs -->
  <circle cx="400" cy="350" r="300" fill="url(#orb-m1)" filter="url(#blur-m)"/>
  <circle cx="800" cy="450" r="250" fill="url(#orb-m2)" filter="url(#blur-m)"/>

  <!-- Globe wireframe -->
  <g fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1">
    <ellipse cx="580" cy="360" rx="240" ry="240"/>
    <ellipse cx="580" cy="360" rx="240" ry="80"/>
    <ellipse cx="580" cy="360" rx="240" ry="40"/>
    <ellipse cx="580" cy="360" rx="140" ry="240"/>
    <ellipse cx="580" cy="360" rx="50" ry="240"/>
    <line x1="340" y1="360" x2="820" y2="360"/>
    <line x1="580" y1="120" x2="580" y2="600"/>
  </g>
  <ellipse cx="580" cy="360" rx="240" ry="240" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Connection dots on globe -->
  <g fill="#F4561D" fill-opacity="0.85">
    <circle cx="520" cy="280" r="5"/>
    <circle cx="640" cy="310" r="7"/>
    <circle cx="490" cy="420" r="4"/>
    <circle cx="680" cy="430" r="5"/>
    <circle cx="570" cy="240" r="4"/>
  </g>
  <!-- Connection lines -->
  <g stroke="#7B2FF0" stroke-opacity="0.4" stroke-width="1.5" fill="none">
    <line x1="520" y1="280" x2="640" y2="310"/>
    <line x1="640" y1="310" x2="680" y2="430"/>
    <line x1="520" y1="280" x2="490" y2="420"/>
    <line x1="490" y1="420" x2="680" y2="430"/>
    <line x1="570" y1="240" x2="640" y2="310"/>
  </g>

  <!-- Trend arrow (upward) -->
  <g opacity="0.7">
    <line x1="920" y1="580" x2="1060" y2="200" stroke="white" stroke-width="3" stroke-opacity="0.3"/>
    <polygon points="1060,200 1040,240 1080,240" fill="white" opacity="0.3"/>
  </g>

  <!-- Brand badge labels -->
  <rect x="740" y="180" width="100" height="26" rx="13" fill="#F4561D" fill-opacity="0.2" stroke="#F4561D" stroke-width="1" stroke-opacity="0.4"/>
  <text x="790" y="198" font-family="'Hanken Grotesk', sans-serif" font-size="11" font-weight="600" fill="white" fill-opacity="0.7" text-anchor="middle">CHERY</text>
  <rect x="840" y="240" width="100" height="26" rx="13" fill="#7B2FF0" fill-opacity="0.2" stroke="#7B2FF0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="890" y="258" font-family="'Hanken Grotesk', sans-serif" font-size="11" font-weight="600" fill="white" fill-opacity="0.7" text-anchor="middle">GWM</text>
  <rect x="780" y="300" width="100" height="26" rx="13" fill="white" fill-opacity="0.05" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <text x="830" y="318" font-family="'Hanken Grotesk', sans-serif" font-size="11" font-weight="600" fill="white" fill-opacity="0.7" text-anchor="middle">OMODA</text>

  <!-- Category label -->
  <rect x="68" y="64" width="100" height="30" rx="15" fill="#7B2FF0" fill-opacity="0.9"/>
  <text x="118" y="84" font-family="'Hanken Grotesk', sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em" fill="white" text-anchor="middle">MARKET</text>

  <text x="68" y="700" font-family="'Archivo Expanded', sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="white" opacity="0.95">New Players.</text>
  <text x="68" y="762" font-family="'Archivo Expanded', sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="#7B2FF0" opacity="0.9">Big Value.</text>
</svg>
