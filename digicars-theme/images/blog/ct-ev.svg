<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bg-e" cx="60%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2B6FF0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </radialGradient>
    <radialGradient id="orb-e" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2B6FF0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2B6FF0" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-e"><feGaussianBlur stdDeviation="50"/></filter>
    <linearGradient id="bolt-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2B6FF0"/>
      <stop offset="100%" stop-color="#7FAAFF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="#0A0E1A"/>
  <rect width="1200" height="800" fill="url(#bg-e)"/>

  <!-- Circuit grid -->
  <g stroke="#2B6FF0" stroke-opacity="0.1" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>

  <!-- Glow orb -->
  <circle cx="750" cy="300" r="280" fill="url(#orb-e)" filter="url(#blur-e)"/>

  <!-- Circuit nodes -->
  <g fill="#2B6FF0" fill-opacity="0.5">
    <circle cx="400" cy="300" r="4"/>
    <circle cx="500" cy="400" r="4"/>
    <circle cx="600" cy="200" r="4"/>
    <circle cx="700" cy="500" r="4"/>
    <circle cx="800" cy="300" r="4"/>
    <circle cx="900" cy="400" r="4"/>
    <circle cx="300" cy="500" r="4"/>
  </g>
  <g stroke="#2B6FF0" stroke-opacity="0.25" stroke-width="1.5" fill="none">
    <polyline points="300,500 400,300 500,400 600,200 700,500 800,300 900,400"/>
  </g>

  <!-- Lightning bolt -->
  <path d="M680 120 L610 380 L670 380 L590 660 L760 340 L690 340 L780 120 Z" fill="url(#bolt-g)" opacity="0.18"/>
  <path d="M680 140 L616 370 L670 370 L598 630 L748 350 L685 350 L768 140 Z" fill="none" stroke="#2B6FF0" stroke-width="2" opacity="0.6"/>

  <!-- Charge indicators -->
  <g fill="#2B6FF0" fill-opacity="0.7">
    <rect x="68" y="540" width="120" height="10" rx="5"/>
    <rect x="68" y="560" width="88" height="10" rx="5"/>
    <rect x="68" y="580" width="48" height="10" rx="5"/>
  </g>

  <!-- Category label -->
  <rect x="68" y="64" width="108" height="30" rx="15" fill="#2B6FF0" fill-opacity="0.9"/>
  <text x="122" y="84" font-family="'Hanken Grotesk', sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em" fill="white" text-anchor="middle">ELECTRIC</text>

  <text x="68" y="700" font-family="'Archivo Expanded', sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="white" opacity="0.95">EV Life</text>
  <text x="68" y="762" font-family="'Archivo Expanded', sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="#2B6FF0" opacity="0.9">in SA.</text>
</svg>
