<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Digicars">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1D22"/>
      <stop offset="0.6" stop-color="#14161A"/>
      <stop offset="1" stop-color="#0E0F12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#F4561D" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F4561D" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <!-- speed streaks -->
  <g stroke="#F4561D" stroke-linecap="round">
    <line x1="980" y1="250" x2="1520" y2="250" stroke-width="3" stroke-opacity="0.9"/>
    <line x1="1060" y1="300" x2="1480" y2="300" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="1140" y1="350" x2="1540" y2="350" stroke-width="2" stroke-opacity="0.35"/>
  </g>
  <!-- abstract vehicle profile -->
  <g fill="none" stroke="#F6F6F4" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M820 640 q40 -150 175 -168 l150 -16 q120 -98 280 -96 q150 2 250 96"/>
    <path d="M820 640 l855 0"/>
    <circle cx="1010" cy="648" r="78" stroke="#F4561D" stroke-opacity="0.9"/>
    <circle cx="1480" cy="648" r="78" stroke="#F4561D" stroke-opacity="0.9"/>
  </g>
</svg>
